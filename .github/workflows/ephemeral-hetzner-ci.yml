name: Ephemeral Hetzner CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  provision-runner:
    runs-on: ubuntu-latest
    outputs:
      server_id: ${{ steps.provision.outputs.server_id }}
      firewall_id: ${{ steps.provision.outputs.firewall_id }}
      runner_label: ${{ steps.provision.outputs.runner_label }}
      runner_name: ${{ steps.provision.outputs.runner_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Provision ephemeral Hetzner runner
        id: provision
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          HETZNER_SERVER_TYPE: cx11
          HETZNER_LOCATION: fsn1
          HETZNER_IMAGE: ubuntu-24.04
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: node scripts/hetzner-ephemeral-ci.mjs provision

  tests:
    needs: provision-runner
    runs-on:
      - self-hosted
      - ${{ needs.provision-runner.outputs.runner_label }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  cleanup-runner:
    if: always()
    needs:
      - provision-runner
      - tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cleanup Hetzner resources
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HCLOUD_SERVER_ID: ${{ needs.provision-runner.outputs.server_id }}
          HCLOUD_FIREWALL_ID: ${{ needs.provision-runner.outputs.firewall_id }}
          GH_RUNNER_NAME: ${{ needs.provision-runner.outputs.runner_name }}
        run: node scripts/hetzner-ephemeral-ci.mjs cleanup
